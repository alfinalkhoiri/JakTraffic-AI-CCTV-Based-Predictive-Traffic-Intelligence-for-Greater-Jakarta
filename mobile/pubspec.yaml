name: jaktraffic_mobile
description: "JakTraffic - AI CCTV Based Predictive Traffic Intelligence for Greater Jakarta"
publish_to: 'none'
version: 0.0.2+2

environment:
  sdk: ^3.5.2

dependencies:
  flutter:
    sdk: flutter

  # Map
  flutter_map: ^6.1.0
  latlong2: ^0.9.1

  # HTTP & Networking
  http: ^1.2.1

  # State Management
  provider: ^6.1.2

  # UI
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.2.5
  flutter_map_marker_cluster: ^1.3.6
  flutter_map_dragmarker: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
